<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 img-src data: {{cspSource}};
                 script-src {{cspSource}};
                 style-src 'unsafe-inline';" />
  <title>Modelica Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--vscode-editor-background, #1e1e1e);
      color: var(--vscode-editor-foreground, #d4d4d4);
      font-family: var(--vscode-font-family, 'Segoe UI', sans-serif);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: var(--vscode-tab-activeBackground, #252526);
      border-bottom: 1px solid var(--vscode-panel-border, #333);
      font-size: 12px;
      user-select: none;
    }

    #toolbar .title {
      flex: 1;
      font-weight: 600;
      color: var(--vscode-foreground, #ccc);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toolbar button {
      background: none;
      border: 1px solid var(--vscode-button-border, transparent);
      color: var(--vscode-foreground, #ccc);
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }

    #toolbar button:hover {
      background: var(--vscode-button-hoverBackground, rgba(255,255,255,0.1));
    }

    #hint {
      font-size: 10px;
      color: var(--vscode-descriptionForeground, #888);
    }

    #svg-container {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }

    #svg-container svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    #status {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--vscode-notifications-background, #252526);
      color: var(--vscode-foreground, #ccc);
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid var(--vscode-panel-border, #444);
      pointer-events: none;
    }

    #error {
      display: none;
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--vscode-inputValidation-errorBackground, #5a1d1d);
      color: var(--vscode-inputValidation-errorForeground, #f48771);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid var(--vscode-inputValidation-errorBorder, #be1100);
      max-width: 80%;
      text-align: center;
      pointer-events: none;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--vscode-descriptionForeground, #888);
    }

    #empty-state .icon { font-size: 48px; opacity: 0.5; }
    #empty-state .msg { font-size: 14px; }
    #empty-state .sub { font-size: 11px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="title" id="toolbar-title">Modelica Preview</span>
    <span id="hint">Scroll to zoom · Drag to pan · Double-click to reset · Click component to navigate</span>
    <button id="btn-reset" title="Reset view">⟳ Reset</button>
    <button id="btn-layer" title="Toggle diagram/icon layer">⊞ Diagram</button>
  </div>

  <div id="svg-container">
    <div id="empty-state">
      <div class="icon">⬡</div>
      <div class="msg">Open a Modelica (.mo) file and run</div>
      <div class="sub"><strong>Modelica: Show Diagram Preview</strong></div>
    </div>
    <div id="status"></div>
    <div id="error"></div>
  </div>

  <!-- Toolbar handlers live in renderer.js — inline scripts are blocked by the webview CSP (script-src only allows extension origin). -->
  <script src="{{rendererUri}}"></script>
</body>
</html>
